services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: schism
      POSTGRES_PASSWORD: schism
      POSTGRES_DB: schism
    ports: ["55432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schism"]
      interval: 2s
      timeout: 3s
      retries: 20

  server:
    build: .
    environment:
      DATABASE_URL: postgres://schism:schism@db:5432/schism?sslmode=disable
      ADDR: ":8080"
      LOG_REQUESTS: "true" # dev convenience; leave unset (off) in production
    ports: ["8080:8080"]
    depends_on:
      db:
        condition: service_healthy
