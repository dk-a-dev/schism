# Fly.io deployment for schism-backend. Rename `app` to something unique, then see DEPLOY.md.
app = "schism-backend"
primary_region = "bom"  # Mumbai — closest to India; change if you prefer

[build]
  dockerfile = "Dockerfile"

[env]
  ADDR = ":8080"
  # DATABASE_URL is injected as a secret by `fly postgres attach` — do not put it here.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
